<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Red background like Nintendo style -->
  <rect x="5" y="5" width="90" height="90" rx="8" fill="#6A31CA" stroke="#5628A8" stroke-width="2"/>
  
  <!-- White "G" cube symbol -->
  <g transform="translate(50, 50)">
    <!-- Simplified cube representation -->
    <path d="M 0,-20 L 15,-10 L 15,10 L 0,20 L -15,10 L -15,-10 Z" 
          fill="white" opacity="0.95" stroke="#5628A8" stroke-width="1.5"/>
    
    <!-- Inner detail -->
    <path d="M 0,-20 L 0,20 M -15,-10 L 15,10 M -15,10 L 15,-10" 
          stroke="#6A31CA" stroke-width="2" opacity="0.3"/>
  </g>
</svg>
