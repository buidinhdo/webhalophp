<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="topFaceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8A6E6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B89D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftFaceGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D2B5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D3B6F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightFaceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4D4B7F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3D3B6F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <g transform="translate(100, 100)">
    <!-- Top face (lightest purple gradient) -->
    <path d="M 0,-55 L 48,-28 L 48,0 L 0,27 L -48,0 L -48,-28 Z" 
          fill="url(#topFaceGradient)" stroke="#2A2847" stroke-width="2"/>
    
    <!-- Left face (dark purple) -->
    <path d="M -48,-28 L -48,0 L 0,27 L 0,0 Z" 
          fill="url(#leftFaceGradient)" stroke="#2A2847" stroke-width="2"/>
    
    <!-- Right face (medium dark purple) -->
    <path d="M 0,0 L 0,27 L 48,0 L 48,-28 Z" 
          fill="url(#rightFaceGradient)" stroke="#2A2847" stroke-width="2"/>
    
    <!-- White "G" emblem on top face -->
    <g transform="translate(0, -14)">
      <!-- Circle background for G -->
      <circle cx="0" cy="0" r="20" fill="white" opacity="0.95"/>
      <!-- G letter shape -->
      <path d="M 0,-15 A 15,15 0 0,0 0,15 L 9,15 L 9,3 L 3,3" 
            stroke="#3D3B6F" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Subtle highlight on top edge -->
    <path d="M 0,-55 L 48,-28" stroke="#B8B6F6" stroke-width="1.5" opacity="0.4"/>
    <path d="M 0,-55 L -48,-28" stroke="#B8B6F6" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
